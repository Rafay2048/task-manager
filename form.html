<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f5f7;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  form {
    background: #fff;
    padding: 24px;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 400px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 16px;
  }
  label {
    display: block;
    margin-bottom: 4px;
    font-weight: bold;
    font-size: 14px;
  }
  input, textarea, select {
    width: 100%;
    padding: 8px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    box-sizing: border-box;
  }
  button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover {
    background: #1d4ed8;
  }
</style>
</head>
<body>

<form>
  <h1>Contact Form</h1>

  <label for="name">Name</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" required>

  <label for="message">Message</label>
  <textarea id="message" name="message" rows="4"></textarea>

  <button type="submit">Submit</button>
</form>

</body>
</html>
